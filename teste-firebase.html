<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Firebase — ServiçoJá</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDgmh5UctN25QCZoNoNctbuCbwMUF97HX4",
    authDomain: "servicoja-e1f49.firebaseapp.com",
    projectId: "servicoja-e1f49",
    storageBucket: "servicoja-e1f49.firebasestorage.app",
    messagingSenderId: "874413426529",
    appId: "1:874413426529:web:9891d44afd9ef1750e6720"
  });
</script>
<style>
  body { font-family: Arial, sans-serif; background: #0A1628; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: #132240; border-radius: 16px; padding: 32px; width: 100%; max-width: 400px; }
  h2 { margin-bottom: 20px; color: #00C96F; }
  input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: #0F1C35; color: white; font-size: 1rem; margin-bottom: 12px; box-sizing: border-box; }
  button { width: 100%; padding: 14px; background: #00C96F; border: none; border-radius: 10px; color: #0A1628; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
  button:hover { background: #009E57; }
  #status { margin-top: 16px; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.05); font-size: 0.9rem; min-height: 40px; }
  .ok { color: #00C96F; }
  .erro { color: #FF5C5C; }
</style>
</head>
<body>
<div class="box">
  <h2>🔥 Teste Firebase</h2>

  <input type="email" id="email" placeholder="Seu email">
  <input type="password" id="senha" placeholder="Senha (mín. 6 caracteres)">

  <button onclick="testarCadastro()">✅ Criar conta teste</button>
  <button onclick="testarLogin()" style="background:#132240;border:1px solid rgba(255,255,255,0.2);color:white">🔑 Fazer login</button>

  <div id="status">Aguardando...</div>
</div>

<script>
  var status = document.getElementById('status');

  function log(msg, tipo) {
    status.innerHTML = msg;
    status.className = tipo || '';
    console.log(msg);
  }

  function testarCadastro() {
    var email = document.getElementById('email').value.trim();
    var senha = document.getElementById('senha').value;

    if (!email || !senha) { log('⚠️ Preencha email e senha!', 'erro'); return; }
    if (senha.length < 6) { log('⚠️ Senha precisa ter 6+ caracteres!', 'erro'); return; }

    log('⏳ Criando conta...', '');

    firebase.auth().createUserWithEmailAndPassword(email, senha)
      .then(function(cred) {
        log('✅ CONTA CRIADA! UID: ' + cred.user.uid, 'ok');
      })
      .catch(function(e) {
        log('❌ ERRO: ' + e.code + ' — ' + e.message, 'erro');
      });
  }

  function testarLogin() {
    var email = document.getElementById('email').value.trim();
    var senha = document.getElementById('senha').value;

    if (!email || !senha) { log('⚠️ Preencha email e senha!', 'erro'); return; }

    log('⏳ Fazendo login...', '');

    firebase.auth().signInWithEmailAndPassword(email, senha)
      .then(function(cred) {
        log('✅ LOGIN OK! Bem-vindo: ' + cred.user.email, 'ok');
        setTimeout(function() { window.location.href = 'login.html'; }, 2000);
      })
      .catch(function(e) {
        log('❌ ERRO: ' + e.code + ' — ' + e.message, 'erro');
      });
  }
</script>
</body>
</html>
